name: Android Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android Dev APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.2
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: 35
          build-tools-version: 35.0.0

      - name: Check if android/ exists, prebuild if needed
        run: |
          if [ ! -d "android" ]; then
            echo "android/ not found, running prebuild..."
            npm run android:prebuild
          else
            echo "android/ already exists, skipping prebuild"
          fi

      - name: Build Android debug APK (Gradle only)
        run: |
          cd android
          ./gradlew assembleDev --no-daemon -x bundleReleaseResources
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flip-debug-apk
          path: android/app/build/outputs/apk/debug/**/*.apk
          retention-days: 7

      - name: Report build status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Android build successful"
          else
            echo "❌ Android build failed — check logs above"
          fi
