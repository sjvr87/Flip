name: Android Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android Dev APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Export NODE_BINARY for Gradle
        run: echo "NODE_BINARY=$(which node)" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Apply Android Gradle patches
        run: node ./scripts/patch-android-node.js && node ./scripts/patch-foojay-gradle.js

      - name: Set up Android SDK
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}"
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Prebuild Android native project
        run: npm run android:prebuild

      - name: Build Android debug APK (Gradle only)
        run: |
          cd android
          ./gradlew assembleDev --no-daemon -x bundleReleaseResources
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          NODE_BINARY: ${{ env.NODE_BINARY }}

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flip-debug-apk
          path: android/app/build/outputs/apk/debug/**/*.apk
          retention-days: 7

      - name: Report build status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Android build successful"
          else
            echo "❌ Android build failed — check logs above"
          fi
