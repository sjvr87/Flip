name: Android Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android Dev APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Export NODE_BINARY for Gradle
        run: echo "NODE_BINARY=$(which node)" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install

      - name: Apply Android Gradle patches
        run: node ./scripts/patch-android-node.js && node ./scripts/patch-foojay-gradle.js

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: 35
          build-tools-version: 35.0.0

      - name: Prebuild Android native project
        run: npm run android:prebuild

      - name: Build Android debug APK (Gradle only)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon -x bundleReleaseResources
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          NODE_BINARY: ${{ env.NODE_BINARY }}

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flip-debug-apk
          path: android/app/build/outputs/apk/debug/**/*.apk
          retention-days: 7

      - name: Report build status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Android build successful"
          else
            echo "❌ Android build failed — check logs above"
          fi
