name: Deploy to Firebase Internal Testing

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: firebase-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy APK to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: 35
          build-tools-version: 35.0.0

      - name: Prebuild if needed
        run: |
          if [ ! -d "android" ]; then
            npm run android:prebuild
          fi

      - name: Build Android release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Write Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > firebase-credentials.json

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFile: firebase-credentials.json
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: "Release ${{ github.ref_name }}"
          testers: ${{ secrets.FIREBASE_TESTERS_EMAIL }}
