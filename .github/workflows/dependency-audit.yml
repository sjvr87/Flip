name: Dependency Audit

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated packages
        run: npm outdated || true

      - name: Report results
        run: |
          echo "## Dependency Audit Results"
          echo ""
          echo "✅ Audit complete. Review vulnerabilities and outdated packages above."
          echo ""
          echo "To fix vulnerabilities locally:"
          echo "  npm audit fix"
          echo ""
          echo "To update packages:"
          echo "  npm update"