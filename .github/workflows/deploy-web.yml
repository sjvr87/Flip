name: Deploy Web Export

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Export & Deploy flip.app
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Export web
        id: export
        continue-on-error: true
        run: npx expo export --platform web

      - name: Prepare Heroku dist (OAuth metadata required; web export optional)
        run: |
          mkdir -p dist
          npm run web:oauth-metadata -- --dist
          node -e "
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync('static.json', 'utf8'));
          cfg.root = './';
          fs.writeFileSync('dist/static.json', JSON.stringify(cfg, null, 2));
          "
          if [ ! -f dist/index.html ]; then
            echo "Web export failed — snapshotting live flip.app SPA shell for fallback routes"
            curl -fsSL "https://flip.app/" -o dist/index.html
          fi
          if [ "${{ steps.export.outcome }}" != "success" ]; then
            echo "::warning::expo export failed; deployed OAuth metadata + SPA shell snapshot only"
          fi
          test -f dist/oauth-client-metadata.json || (echo "Missing dist/oauth-client-metadata.json" && exit 1)
          cp Procfile dist/Procfile
          node -e "
          const fs = require('fs');
          const server = fs.readFileSync('server.js', 'utf8').replace(
            \"const dist = path.join(__dirname, 'dist');\",
            'const dist = __dirname;'
          );
          fs.writeFileSync('dist/server.js', server);
          fs.writeFileSync('dist/package.json', JSON.stringify({
            name: 'flip-web',
            private: true,
            engines: { node: '20.x' }
          }, null, 2) + '\n');
          "
          test -f dist/Procfile || (echo "Missing dist/Procfile" && exit 1)
          test -f dist/server.js || (echo "Missing dist/server.js" && exit 1)
          echo "dist deploy payload:"
          ls -la dist/oauth-client-metadata.json dist/Procfile dist/server.js dist/package.json dist/index.html 2>/dev/null || true

      - name: Install Heroku CLI
        run: curl -fsSL https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${HEROKU_API_KEY:-}" ]; then
            echo "::error::HEROKU_API_KEY secret is not set"
            exit 1
          fi
          APP_NAME="${HEROKU_APP_NAME:-flip-app}"
          cat > ~/.netrc <<EOF
          machine api.heroku.com
            login ${HEROKU_EMAIL:-x}
            password ${HEROKU_API_KEY}
          machine git.heroku.com
            login ${HEROKU_EMAIL:-x}
            password ${HEROKU_API_KEY}
          EOF
          chmod 600 ~/.netrc
          echo "Deploying dist/ to Heroku app: $APP_NAME"
          if ! heroku apps:info -a "$APP_NAME"; then
            echo "::error::Heroku app '$APP_NAME' not found for this API key. Set HEROKU_APP_NAME to the app behind flip.app."
            heroku apps --all || true
            exit 1
          fi
          cd dist
          git init -b main
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "Deploy web export ${GITHUB_SHA}"
          heroku git:remote -a "$APP_NAME"
          git push -f heroku main

      - name: Verify OAuth metadata on flip.app
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 15
            code=$(curl -fsS -o /tmp/oauth-meta.json -w "%{http_code}" https://flip.app/oauth-client-metadata.json || echo "000")
            type=$(curl -fsSI https://flip.app/oauth-client-metadata.json 2>/dev/null | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print $2; exit}')
            echo "attempt $i: HTTP $code Content-Type: $type"
            head -c 120 /tmp/oauth-meta.json 2>/dev/null; echo
            if [ "$code" = "200" ] && echo "$type" | grep -qi 'application/json' && grep -q '"client_id"' /tmp/oauth-meta.json; then
              exit 0
            fi
          done
          exit 1
