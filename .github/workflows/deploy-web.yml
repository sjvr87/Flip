name: Deploy Web Export

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Export & Deploy flip.app
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Export web
        id: export
        continue-on-error: true
        run: npx expo export --platform web

      - name: Prepare Heroku dist (OAuth metadata required; web export optional)
        run: |
          mkdir -p dist
          npm run web:oauth-metadata -- --dist
          node -e "
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync('static.json', 'utf8'));
          cfg.root = './';
          fs.writeFileSync('dist/static.json', JSON.stringify(cfg, null, 2));
          "
          if [ ! -f dist/index.html ]; then
            echo "Web export failed — snapshotting live flip.app SPA shell for fallback routes"
            curl -fsSL "https://flip.app/" -o dist/index.html
          fi
          if [ "${{ steps.export.outcome }}" != "success" ]; then
            echo "::warning::expo export failed; deployed OAuth metadata + SPA shell snapshot only"
          fi
          test -f dist/oauth-client-metadata.json || (echo "Missing dist/oauth-client-metadata.json" && exit 1)
          test -f dist/static.json || (echo "Missing dist/static.json" && exit 1)
          echo "dist deploy payload:"
          ls -la dist/oauth-client-metadata.json dist/static.json dist/index.html 2>/dev/null || true

      - name: Install Heroku CLI
        run: curl -fsSL https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: flip-app
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          appdir: dist
          dontautocreate: true

      - name: Verify OAuth metadata on flip.app
        run: |
          sleep 10
          code=$(curl -fsS -o /tmp/oauth-meta.json -w "%{http_code}" https://flip.app/oauth-client-metadata.json)
          type=$(curl -fsSI https://flip.app/oauth-client-metadata.json | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print $2; exit}')
          echo "HTTP $code Content-Type: $type"
          head -c 120 /tmp/oauth-meta.json; echo
          test "$code" = "200" || exit 1
          echo "$type" | grep -qi 'application/json' || exit 1
          grep -q '"client_id"' /tmp/oauth-meta.json || exit 1
