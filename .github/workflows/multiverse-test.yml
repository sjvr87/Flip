name: Multiverse Server Tests

on:
  push:
    paths:
      - 'server/**'
      - 'package.json'
      - '.github/workflows/multiverse-test.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'package.json'
      - '.github/workflows/multiverse-test.yml'

concurrency:
  group: multiverse-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  multiverse-test:
    name: Multiverse server tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run multiverse tests
        env:
          FLIP_TOKEN_ENCRYPTION_KEY: ci-test-encryption-key-32-chars-min!!
        run: npm run multiverse:test
