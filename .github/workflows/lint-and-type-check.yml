name: Lint and Type Check

on:
  push:
  pull_request:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Determine changed JS/TS files
        id: changed-files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
            if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              base_sha="$(git rev-parse HEAD~1)"
            fi
          fi

          changed_files=$(git diff --name-only --diff-filter=ACMRT "$base_sha" "${{ github.sha }}" -- '*.js' '*.jsx' '*.ts' '*.tsx')

          if [[ -z "$changed_files" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf "%s\n" "$changed_files" > .changed-js-ts-files
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Run ESLint
        if: steps.changed-files.outputs.has_changes == 'true'
        run: xargs npx eslint --max-warnings=0 < .changed-js-ts-files

      - name: Run TypeScript type check
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: npx tsc --noEmit
