name: Auto Review & Merge by Copilot

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]

jobs:
  review-and-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}

      - name: Run tests (if any)
        run: |
          if [ -f "package.json" ]; then
            npm install
            npm test || echo "Tests need attention"
          fi
        continue-on-error: true

      - name: Copilot review comment
        uses: actions/github-script@v6
        continue-on-error: true
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'COMMENT',
              body: '🤖 **Copilot Review**: Analyzing your changes. Human approval is required before merge.',
            });

      - name: Merge when human-approved
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request in payload; skipping merge step.');
              return;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const latestByUser = new Map();
            for (const review of reviews) {
              latestByUser.set(review.user.login, review);
            }

            const hasHumanApproval = [...latestByUser.values()].some(
              (review) =>
                review.state === 'APPROVED' &&
                review.user.type !== 'Bot' &&
                review.user.login !== 'github-actions[bot]',
            );

            if (!hasHumanApproval) {
              core.info(
                'No human approval yet (reviewDecision would be REVIEW_REQUIRED). Skipping merge.',
              );
              return;
            }

            const { data: prState } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            if (!prState.mergeable) {
              core.info('PR is not mergeable yet; skipping merge.');
              return;
            }

            core.info('Human approval present and PR is mergeable; merging.');
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash',
            });
